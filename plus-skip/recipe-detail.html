<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぷらすきっぷ - わくわくレシピ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    class="min-h-screen bg-slate-100 flex justify-center text-brand-dark selection:bg-brand-accent selection:text-white overflow-x-hidden"
  >
    <div
      class="w-full max-w-4xl lg:max-w-none bg-transparent relative flex flex-col mx-auto my-0 overflow-x-hidden"
    >
      <header
        id="global-header"
        class="sticky top-0 z-[90] bg-brand-main border-x-[3px] border-b-[6px] lg:border-x-0 border-brand-dark px-6 py-4 md:py-5 flex justify-between items-center transition-colors duration-300"
      >
        <div id="header-left">
          <button
            id="back-btn"
            onclick="navigateTo('recipe-list')"
            class="w-12 h-12 border-[3px] border-brand-dark rounded-xl shadow-[2px_2px_0px_0px_#1e293b] hover:bg-slate-100 transition-all flex items-center justify-center shrink-0 bg-white p-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-brand-dark pr-0.5"
            >
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
        </div>
        <h2
          id="header-title"
          class="font-black text-xl absolute left-1/2 transform -translate-x-1/2 hidden sm:block text-brand-dark"
        >
          レシピ詳細
        </h2>
        <button
          onclick="toggleMenu()"
          class="relative w-12 h-12 bg-white border-[3px] border-brand-dark rounded-xl shadow-[2px_2px_0px_0px_#1e293b] hover:bg-gray-100 transition-all flex items-center justify-center shrink-0 p-0 z-[100]"
        >
          <div
            class="flex flex-col justify-center items-center gap-[5px] w-6 h-6"
          >
            <span
              id="menu-line-1"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300"
            ></span>
            <span
              id="menu-line-2"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300 opacity-100"
            ></span>
            <span
              id="menu-line-3"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300"
            ></span>
          </div>
        </button>
      </header>

      <main
        id="main-content"
        class="flex-1 transition-all duration-300 bg-transparent"
      >
        <div
          id="view-recipe-detail"
          class="view-section pb-32 lg:pb-0 animate-view"
        >
          <section
            class="bg-brand-main border-x-[3px] border-b-[3px] lg:border-x-0 border-brand-dark rounded-b-[48px] lg:rounded-none relative z-40 py-16 md:py-20 -mt-[3px]"
          >
            <div
              class="px-6 max-w-2xl mx-auto flex flex-col items-center text-center mt-4"
            >
              <div id="detail-icon-container">
                <span id="detail-icon" class="text-5xl md:text-7xl"></span>
              </div>
              <h1
                id="detail-title"
                class="font-black text-3xl md:text-5xl leading-tight mb-6 bg-white border-[3px] border-brand-dark px-6 md:px-8 py-3 md:py-4 rounded-3xl shadow-[6px_6px_0px_0px_#1e293b] text-brand-dark animate-fade-up"
                style="animation-delay: 100ms"
              ></h1>
              <div
                id="detail-tags"
                class="flex flex-wrap justify-center gap-3 animate-fade-up"
                style="animation-delay: 200ms"
              ></div>
            </div>
          </section>

          <section
            class="bg-white border-x-[3px] border-b-[3px] lg:border-x-0 border-brand-dark rounded-b-[48px] lg:rounded-none relative z-30 -mt-[48px] lg:mt-0 pt-[96px] lg:pt-24 pb-24"
          >
            <div class="px-6 md:px-12 max-w-4xl mx-auto">
              <h3
                class="font-black text-2xl md:text-3xl mb-8 flex items-center gap-3 text-brand-dark animate-fade-up"
                style="animation-delay: 300ms"
              >
                <div
                  class="w-3 h-8 md:h-10 bg-brand-mint border-[2px] border-brand-dark rounded-full transform rotate-12"
                ></div>
                くわしいレシピ
              </h3>
              <div class="space-y-6 md:space-y-8 max-w-3xl">
                <div
                  class="bg-slate-50 border-[3px] border-brand-dark rounded-[32px] p-6 md:p-8 shadow-[6px_6px_0px_0px_#1e293b] relative animate-fade-up"
                  style="animation-delay: 400ms"
                >
                  <div
                    class="absolute -top-5 -left-3 md:-left-5 w-12 h-12 md:w-14 md:h-14 bg-brand-accent text-white border-[3px] border-brand-dark rounded-full flex items-center justify-center font-black text-2xl shadow-[2px_2px_0px_0px_#1e293b] transform -rotate-12"
                  >
                    1
                  </div>
                  <p
                    id="detail-step1"
                    class="font-bold text-base md:text-lg leading-relaxed mt-2 text-brand-dark"
                  ></p>
                </div>
                <div
                  class="bg-slate-50 border-[3px] border-brand-dark rounded-[32px] p-6 md:p-8 shadow-[6px_6px_0px_0px_#1e293b] relative animate-fade-up"
                  style="animation-delay: 500ms"
                >
                  <div
                    class="absolute -top-5 -left-3 md:-left-5 w-12 h-12 md:w-14 md:h-14 bg-brand-main text-brand-dark border-[3px] border-brand-dark rounded-full flex items-center justify-center font-black text-2xl shadow-[2px_2px_0px_0px_#1e293b] transform rotate-12"
                  >
                    2
                  </div>
                  <p
                    class="font-bold text-base md:text-lg leading-relaxed mt-2 text-brand-dark"
                  >
                    全力で、誰にもバレないように心の中で実践します。これぞ日常のサボりです。
                  </p>
                </div>
              </div>
            </div>
          </section>

          <div
            class="fixed bottom-6 left-0 w-full px-6 z-50 pointer-events-none"
          >
            <div
              class="max-w-2xl mx-auto pointer-events-auto flex flex-col sm:flex-row gap-4 animate-fade-up"
              style="animation-delay: 600ms"
            >
              <button
                id="detail-share-btn"
                class="w-full sm:w-1/3 bg-white text-brand-dark border-[3px] border-brand-dark rounded-[24px] py-4 md:py-5 font-black text-lg md:text-xl shadow-[6px_6px_0px_0px_#1e293b] transition-all flex items-center justify-center gap-2"
              >
                🔗 シェア
              </button>
              <button
                id="detail-done-btn"
                class="w-full sm:w-2/3 bg-brand-accent text-white border-[3px] border-brand-dark rounded-[24px] py-4 md:py-5 font-black text-lg md:text-xl shadow-[6px_6px_0px_0px_#1e293b] transition-all flex items-center justify-center gap-2 transform sm:-rotate-1"
              >
                🎉 やってみた！
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer
        id="global-footer"
        class="bg-brand-dark text-white relative z-0 py-16 px-8 md:px-16 border-x-[3px] lg:border-x-0 border-b-[3px] lg:border-b-0 border-brand-dark -mt-[48px] pt-[80px]"
      >
        <div
          class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-start gap-10 border-b-2 border-white/20 pb-12"
        >
          <div class="flex flex-col items-start gap-2">
            <h2 class="font-black text-2xl tracking-widest text-brand-main">
              ぷらすきっぷ
            </h2>
            <p class="font-bold text-sm text-slate-300">
              日常にもうひとつ、わくわくをプラス
            </p>
          </div>
        </div>
        <div class="text-left pt-8">
          <p class="text-[11px] font-bold text-slate-400 tracking-widest">
            @Plus-skip 2026
          </p>
        </div>
      </footer>

      <div
        id="side-menu-overlay"
        class="fixed top-0 bottom-0 left-0 right-0 z-[100] transition-opacity duration-300 pointer-events-none opacity-0"
      >
        <div
          id="side-menu-bg"
          onclick="toggleMenu()"
          class="absolute inset-0 bg-brand-dark/40 pointer-events-none"
        ></div>
        <div
          id="side-menu-panel"
          class="absolute top-0 right-0 w-4/5 md:w-80 h-full bg-brand-main border-l-[3px] border-brand-dark rounded-l-[40px] transform translate-x-full pointer-events-none transition-transform duration-300 flex flex-col shadow-none"
        >
          <div class="p-6 flex justify-end">
            <button
              onclick="toggleMenu()"
              class="w-12 h-12 bg-white border-[3px] border-brand-dark rounded-[16px] shadow-[4px_4px_0px_0px_#1e293b] hover:bg-slate-100 transition-all flex items-center justify-center shrink-0 p-0"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-brand-dark"
              >
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </div>
          <div class="px-6 flex flex-col gap-5 font-black mt-2 flex-1">
            <button
              onclick="navigateTo('home')"
              class="w-full bg-white text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-4 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform -rotate-6 shrink-0 text-brand-dark"
              >
                🏠
              </div>
              <span>ホーム</span>
            </button>
            <button
              onclick="
                navigateTo('home');
                setTimeout(scrollToElement, 100, 'lottery-section');
              "
              class="w-full bg-brand-accent text-white border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-6 shrink-0"
              >
                ✨
              </div>
              <span class="text-left leading-tight">レシピがちゃ</span>
            </button>
            <button
              onclick="navigateTo('recipe-list')"
              class="w-full bg-brand-mint text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-4 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform -rotate-3 shrink-0"
              >
                🔍
              </div>
              <span>レシピを探す</span>
            </button>
            <button
              onclick="navigateTo('memory-list')"
              class="w-full bg-brand-main text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-3 shrink-0"
              >
                💜
              </div>
              <span class="text-left leading-tight">コレクション</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
