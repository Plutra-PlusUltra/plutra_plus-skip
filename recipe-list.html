<!doctype html>
<html lang="ja" class="overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぷらすきっぷ - わくわくレシピ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    class="min-h-screen bg-slate-100 text-brand-dark selection:bg-brand-accent selection:text-white overflow-x-hidden"
  >
    <div
      class="w-full max-w-4xl lg:max-w-none bg-transparent relative flex flex-col mx-auto my-0 overflow-x-hidden"
    >
      <header
        id="global-header"
        class="sticky top-0 z-[90] bg-brand-mint border-x-[3px] border-b-[6px] lg:border-x-0 border-brand-dark px-6 py-4 md:py-5 flex justify-between items-center transition-colors duration-300"
      >
        <div id="header-left">
          <button
            id="back-btn"
            onclick="navigateTo('home')"
            class="w-12 h-12 border-[3px] border-brand-dark rounded-xl shadow-[2px_2px_0px_0px_#1e293b] hover:bg-slate-100 transition-all flex items-center justify-center shrink-0 bg-white p-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-brand-dark pr-0.5"
            >
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
        </div>
        <h2
          id="header-title"
          class="font-black text-xl absolute left-1/2 transform -translate-x-1/2 hidden sm:block text-brand-dark"
        >
          レシピをさがす
        </h2>
        <button
          onclick="toggleMenu()"
          class="relative w-12 h-12 bg-white border-[3px] border-brand-dark rounded-xl shadow-[2px_2px_0px_0px_#1e293b] hover:bg-gray-100 transition-all flex items-center justify-center shrink-0 p-0 z-[100]"
        >
          <div
            class="flex flex-col justify-center items-center gap-[5px] w-6 h-6"
          >
            <span
              id="menu-line-1"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300"
            ></span>
            <span
              id="menu-line-2"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300 opacity-100"
            ></span>
            <span
              id="menu-line-3"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300"
            ></span>
          </div>
        </button>
      </header>

      <main
        id="main-content"
        class="flex-1 transition-all duration-300 bg-transparent"
      >
        <div id="view-recipe-list" class="view-section animate-view">
          <div
            class="bg-brand-mint min-h-screen pb-20 pt-8 md:pt-12 border-x-[3px] lg:border-x-0 border-b-[3px] border-brand-dark rounded-b-[48px] lg:rounded-none relative z-20 -mt-[3px]"
          >
            <div class="px-6 md:px-12 max-w-4xl mx-auto">
              <div
                class="mb-8 flex flex-col md:flex-row md:justify-between md:items-end gap-4"
                id="recipe-list-title-container"
              >
                <h2
                  class="font-black text-2xl md:text-3xl text-white drop-shadow-[2px_2px_0px_#1e293b]"
                  id="recipe-list-title"
                >
                  レシピ一覧
                </h2>
              </div>
              <div
                id="recipe-list-grid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"
              ></div>
            </div>
          </div>
        </div>
      </main>

      <footer
        id="global-footer"
        class="bg-brand-dark text-white relative z-0 py-16 px-8 md:px-16 border-x-[3px] lg:border-x-0 border-b-[3px] lg:border-b-0 border-brand-dark -mt-[48px] pt-[80px]"
      >
        <div
          class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-start gap-10 border-b-2 border-white/20 pb-12"
        >
          <div class="flex flex-col items-start gap-2">
            <h2 class="font-black text-2xl tracking-widest text-brand-main">
              ぷらすきっぷ
            </h2>
            <p class="font-bold text-sm text-slate-300">
              日常にもうひとつ、わくわくをプラス
            </p>
          </div>
        </div>
        <div class="text-left pt-8">
          <p class="text-[11px] font-bold text-slate-400 tracking-widest">
            @Plus-skip 2026
          </p>
        </div>
      </footer>

      <div
        id="side-menu-overlay"
        class="fixed top-0 bottom-0 left-0 right-0 z-[100] transition-opacity duration-300 pointer-events-none opacity-0"
      >
        <div
          id="side-menu-bg"
          onclick="toggleMenu()"
          class="absolute inset-0 bg-brand-dark/40 pointer-events-none"
        ></div>
        <div
          id="side-menu-panel"
          class="absolute top-0 right-0 w-4/5 md:w-80 h-full bg-brand-main border-l-[3px] border-brand-dark rounded-l-[40px] transform translate-x-full pointer-events-none transition-transform duration-300 flex flex-col shadow-none"
        >
          <div class="p-6 flex justify-end">
            <button
              onclick="toggleMenu()"
              class="w-12 h-12 bg-white border-[3px] border-brand-dark rounded-[16px] shadow-[4px_4px_0px_0px_#1e293b] hover:bg-slate-100 transition-all flex items-center justify-center shrink-0 p-0"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-brand-dark"
              >
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </div>
          <div class="px-6 flex flex-col gap-5 font-black mt-2 flex-1">
            <button
              onclick="navigateTo('home')"
              class="w-full bg-white text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-4 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform -rotate-6 shrink-0 text-brand-dark"
              >
                🏠
              </div>
              <span>ホーム</span>
            </button>
            <button
              onclick="
                navigateTo('home');
                setTimeout(scrollToElement, 100, 'lottery-section');
              "
              class="w-full bg-brand-accent text-white border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-6 shrink-0"
              >
                ✨
              </div>
              <span class="text-left leading-tight">レシピがちゃ</span>
            </button>
            <button
              onclick="navigateTo('recipe-list')"
              class="w-full bg-brand-mint text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-4 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform -rotate-3 shrink-0"
              >
                🔍
              </div>
              <span>レシピを探す</span>
            </button>
            <button
              onclick="navigateTo('memory-list')"
              class="w-full bg-brand-main text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-3 shrink-0"
              >
                💜
              </div>
              <span class="text-left leading-tight">コレクション</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
