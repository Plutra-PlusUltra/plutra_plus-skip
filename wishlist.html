<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ぷらすきっぷ - わくわくレシピ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body
    class="min-h-screen bg-slate-100 text-brand-dark selection:bg-brand-accent selection:text-white"
  >
    <div
      class="w-full max-w-4xl lg:max-w-none bg-transparent relative flex flex-col min-h-screen mx-auto my-0"
    >
      <header
        id="global-header"
        class="sticky top-0 z-[90] bg-brand-main border-x-[3px] border-b-[6px] lg:border-x-0 border-brand-dark px-6 py-4 md:py-5 flex justify-between items-center transition-colors duration-300"
      >
        <div id="header-left">
          <button
            id="home-btn"
            onclick="navigateTo('home')"
            class="font-black text-lg bg-white px-6 py-2 border-[3px] border-brand-dark rounded-full shadow-[2px_2px_0px_0px_#1e293b] hover:translate-y-[1px] hover:shadow-[1px_1px_0px_0px_#1e293b] active:translate-y-[2px] active:shadow-none transition-all flex items-center gap-2"
          >
            <span
              class="bg-white border-[2px] border-brand-dark rounded-full w-6 h-6 flex items-center justify-center text-xs text-brand-dark"
              >ぷ</span
            >
            <span class="text-brand-dark">ぷらすきっぷ</span>
          </button>
        </div>
        <button
          onclick="toggleMenu()"
          class="relative w-12 h-12 bg-white border-[3px] border-brand-dark rounded-xl shadow-[2px_2px_0px_0px_#1e293b] hover:bg-gray-100 transition-all flex items-center justify-center shrink-0 p-0 z-[100]"
        >
          <div
            class="flex flex-col justify-center items-center gap-[5px] w-6 h-6"
          >
            <span
              id="menu-line-1"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300"
            ></span>
            <span
              id="menu-line-2"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300 opacity-100"
            ></span>
            <span
              id="menu-line-3"
              class="w-5 h-[3px] bg-brand-dark rounded-full transition-all duration-300"
            ></span>
          </div>
        </button>
      </header>

      <main
        id="main-content"
        class="flex-1 flex flex-col transition-all duration-300 bg-transparent overflow-x-hidden"
      >
        <div class="view-section flex-1 flex flex-col animate-view">
          <section
            class="bg-brand-main border-x-[3px] border-b-[3px] lg:border-x-0 border-brand-dark rounded-b-[48px] lg:rounded-none relative z-40 py-12 -mt-[3px]"
          >
            <div class="px-6 max-w-4xl mx-auto flex items-center gap-4">
              <div
                class="w-16 h-16 bg-white border-[3px] border-brand-dark rounded-2xl flex items-center justify-center shadow-[4px_4px_0px_0px_#1e293b] shrink-0 text-3xl transform rotate-3"
              >
                ⭐
              </div>
              <div>
                <h1 class="font-black text-2xl md:text-3xl text-brand-dark">
                  やってみたいリスト
                </h1>
                <p class="font-bold text-sm mt-1 text-brand-dark opacity-80">
                  あとで挑戦するレシピのストック
                </p>
              </div>
            </div>
          </section>

          <section
            class="bg-slate-100 flex-1 flex flex-col border-x-[3px] lg:border-x-0 border-brand-dark relative z-30 py-12"
          >
            <div class="px-6 max-w-4xl mx-auto w-full flex-1">
              <div
                id="wishlist-grid"
                class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"
              ></div>

              <div
                id="wishlist-empty"
                class="hidden h-full flex flex-col items-center justify-center text-center py-20"
              >
                <div class="text-6xl mb-6 opacity-40">⭐</div>
                <h3 class="font-black text-xl text-brand-dark mb-2">
                  リストはからっぽです
                </h3>
                <p class="text-sm font-bold text-slate-500 mb-8">
                  気になったレシピの「⭐ やってみたい」ボタンを押して<br />ここにストックしよう！
                </p>
                <button
                  onclick="navigateTo('recipe-list')"
                  class="bg-white text-brand-dark border-[3px] border-brand-dark rounded-[24px] py-4 px-8 font-black text-base shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center justify-center gap-2"
                >
                  レシピを探しにいく 🔍
                </button>
              </div>
            </div>
          </section>
        </div>
      </main>

      <div
        id="side-menu-overlay"
        class="fixed top-0 bottom-0 left-0 right-0 z-[100] transition-opacity duration-300 pointer-events-none opacity-0"
      >
        <div
          id="side-menu-bg"
          onclick="toggleMenu()"
          class="absolute inset-0 bg-brand-dark/40 pointer-events-none"
        ></div>
        <div
          id="side-menu-panel"
          class="absolute top-0 right-0 w-4/5 md:w-80 h-full bg-brand-main border-l-[3px] border-brand-dark rounded-l-[40px] transform translate-x-full pointer-events-none transition-transform duration-300 flex flex-col shadow-none"
        >
          <div class="p-6 flex justify-end">
            <button
              onclick="toggleMenu()"
              class="w-12 h-12 bg-white border-[3px] border-brand-dark rounded-[16px] shadow-[4px_4px_0px_0px_#1e293b] hover:bg-slate-100 transition-all flex items-center justify-center shrink-0 p-0"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-brand-dark"
              >
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
              </svg>
            </button>
          </div>
          <div class="px-6 flex flex-col gap-5 font-black mt-2 flex-1">
            <button
              onclick="navigateTo('home')"
              class="w-full bg-brand-main text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-4 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform -rotate-6 shrink-0 text-brand-dark"
              >
                🏠
              </div>
              <span>ホーム</span>
            </button>
            <button
              onclick="goToLottery()"
              class="w-full bg-white text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-6 shrink-0"
              >
                ✨
              </div>
              <span class="text-left leading-tight">レシピがちゃ</span>
            </button>
            <button
              onclick="navigateTo('recipe-list')"
              class="w-full bg-brand-mint text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-4 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform -rotate-3 shrink-0"
              >
                🔍
              </div>
              <span>レシピを探す</span>
            </button>
            <button
              onclick="navigateTo('wishlist')"
              class="w-full bg-brand-main text-brand-dark border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-6 shrink-0"
              >
                ⭐
              </div>
              <span class="text-left leading-tight">やってみたい</span>
            </button>
            <button
              onclick="navigateTo('memory-list')"
              class="w-full bg-brand-accent text-white border-[3px] border-brand-dark rounded-[20px] py-3.5 px-6 font-black text-base md:text-[17px] shadow-[6px_6px_0px_0px_#1e293b] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_#1e293b] active:translate-y-2 active:shadow-none transition-all flex items-center gap-4"
            >
              <div
                class="w-8 h-8 bg-white text-brand-dark border-[2px] border-brand-dark rounded-lg flex items-center justify-center shadow-[2px_2px_0px_0px_#1e293b] text-base transform rotate-3 shrink-0"
              >
                💜
              </div>
              <span class="text-left leading-tight">コレクション</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
